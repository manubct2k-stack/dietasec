<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NutriVida — Plano Alimentar Personalizado</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d1a0f;
      --surface: #122116;
      --card: #172d1c;
      --accent: #6fcf6f;
      --accent2: #a8e6a3;
      --gold: #c8a84b;
      --text: #e8f5e3;
      --muted: #7a9e7a;
      --border: #2a4a2a;
      --danger: #e06060;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 40% at 20% 20%, rgba(111,207,111,0.07) 0%, transparent 60%),
        radial-gradient(ellipse 50% 60% at 80% 80%, rgba(200,168,75,0.05) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    .noise {
      position: fixed; inset: 0; z-index: 1; pointer-events: none; opacity: 0.03;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    }

    header {
      position: relative; z-index: 10;
      padding: 2.5rem 2rem 0;
      text-align: center;
      animation: fadeDown 0.9s ease both;
    }

    .logo-leaf { font-size: 2.2rem; margin-bottom: 0.4rem; display: block; }

    header h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.2rem, 5vw, 3.5rem);
      color: var(--accent);
      letter-spacing: -0.02em;
      line-height: 1.1;
    }

    header h1 span { color: var(--gold); font-style: italic; }

    header p {
      color: var(--muted);
      font-size: 1rem;
      margin-top: 0.6rem;
      font-weight: 300;
      letter-spacing: 0.04em;
    }

    .divider {
      width: 60px; height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      margin: 1.4rem auto 0;
    }

    main {
      position: relative; z-index: 10;
      max-width: 680px;
      margin: 0 auto;
      padding: 2.5rem 1.5rem 4rem;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 2rem;
      animation: fadeUp 0.7s 0.2s ease both;
    }

    .card h2 {
      font-family: 'Playfair Display', serif;
      font-size: 1.3rem;
      color: var(--accent2);
      margin-bottom: 1.5rem;
      display: flex; align-items: center; gap: 0.5rem;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }

    .field { display: flex; flex-direction: column; gap: 0.35rem; }
    .field.full { grid-column: 1 / -1; }

    label {
      font-size: 0.78rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.09em;
      color: var(--muted);
    }

    input[type="text"], input[type="number"] {
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 1rem;
      padding: 0.7rem 1rem;
      outline: none;
      transition: border-color 0.25s, box-shadow 0.25s;
      width: 100%;
    }
    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(111,207,111,0.12);
    }
    input::placeholder { color: #3a5a3a; }

    .goal-section { margin-top: 1.5rem; }
    .goal-section > label {
      display: block; margin-bottom: 0.7rem;
      font-size: 0.78rem; font-weight: 500;
      text-transform: uppercase; letter-spacing: 0.09em; color: var(--muted);
    }
    .goal-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 0.8rem; }

    .goal-btn {
      background: rgba(255,255,255,0.03);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      padding: 1rem 0.8rem;
      text-align: center;
      transition: all 0.25s;
    }
    .goal-btn .icon { font-size: 1.8rem; display: block; margin-bottom: 0.4rem; }
    .goal-btn .lbl { font-weight: 500; display: block; }
    .goal-btn .sub { font-size: 0.78rem; color: var(--muted); display: block; margin-top: 0.2rem; }
    .goal-btn:hover { border-color: var(--accent); background: rgba(111,207,111,0.07); }
    .goal-btn.active {
      border-color: var(--accent);
      background: rgba(111,207,111,0.12);
      box-shadow: 0 0 0 3px rgba(111,207,111,0.15);
    }
    .goal-btn.muscle.active {
      border-color: var(--gold);
      background: rgba(200,168,75,0.1);
      box-shadow: 0 0 0 3px rgba(200,168,75,0.15);
    }

    .btn-generate {
      margin-top: 1.8rem;
      width: 100%;
      background: linear-gradient(135deg, #3a8a3a, #5cb85c);
      border: none;
      border-radius: 12px;
      color: #fff;
      cursor: pointer;
      font-family: 'Playfair Display', serif;
      font-size: 1.1rem;
      font-style: italic;
      letter-spacing: 0.02em;
      padding: 1rem 2rem;
      transition: all 0.3s;
    }
    .btn-generate:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(92,184,92,0.3);
    }
    .btn-generate:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .loading {
      display: none;
      text-align: center;
      padding: 3rem 1rem;
      animation: fadeUp 0.5s ease both;
    }
    .loading.visible { display: block; }

    .spinner {
      width: 48px; height: 48px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
      margin: 0 auto 1rem;
    }
    .loading p { color: var(--muted); font-size: 0.9rem; }
    .loading-quote { color: var(--accent); font-family: 'Playfair Display', serif; font-style: italic; font-size: 1rem; margin-top: 0.5rem; }

    #result { display: none; margin-top: 2rem; animation: fadeUp 0.7s ease both; }
    #result.visible { display: block; }

    .result-header {
      background: linear-gradient(135deg, var(--card), #1e3820);
      border: 1px solid var(--accent);
      border-radius: 16px 16px 0 0;
      padding: 1.5rem 1.8rem;
      border-bottom: none;
    }
    .result-header .badge {
      display: inline-block;
      background: var(--accent);
      color: #0a1a0a;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 0.25rem 0.7rem;
      border-radius: 20px;
      margin-bottom: 0.6rem;
    }
    .result-header.muscle .badge { background: var(--gold); }
    .result-header h3 { font-family: 'Playfair Display', serif; font-size: 1.5rem; color: var(--accent2); }
    .result-header.muscle h3 { color: #e8d090; }
    .result-header p { color: var(--muted); font-size: 0.85rem; margin-top: 0.3rem; }

    .result-body {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 0 0 16px 16px;
      padding: 1.8rem;
      border-top: none;
    }

    .result-body h2 {
      font-family: 'Playfair Display', serif;
      color: var(--accent);
      font-size: 1.15rem;
      margin: 1.4rem 0 0.6rem;
      padding-bottom: 0.4rem;
      border-bottom: 1px solid var(--border);
    }
    .result-body h2:first-child { margin-top: 0; }
    .result-body h3 {
      color: var(--gold);
      font-size: 0.95rem;
      font-weight: 600;
      margin: 1rem 0 0.4rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .result-body p { color: var(--text); line-height: 1.7; margin: 0.4rem 0; font-size: 0.95rem; }
    .result-body ul { padding-left: 1.4rem; margin: 0.4rem 0; }
    .result-body li { color: var(--text); line-height: 1.7; font-size: 0.95rem; margin: 0.2rem 0; }
    .result-body strong { color: var(--accent2); font-weight: 600; }
    .result-body em { color: var(--muted); font-style: italic; }

    .meal-block {
      background: rgba(111,207,111,0.04);
      border: 1px solid rgba(111,207,111,0.15);
      border-radius: 10px;
      padding: 0.9rem 1.1rem;
      margin: 0.6rem 0;
    }
    .meal-block.muscle-bg {
      background: rgba(200,168,75,0.04);
      border-color: rgba(200,168,75,0.15);
    }

    .btn-reset {
      display: block; width: 100%; margin-top: 1.2rem;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--muted);
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      padding: 0.75rem;
      transition: all 0.2s;
    }
    .btn-reset:hover { border-color: var(--accent); color: var(--accent); }

    .error-msg {
      background: rgba(224,96,96,0.1);
      border: 1px solid var(--danger);
      border-radius: 10px;
      color: #f5a0a0;
      font-size: 0.88rem;
      margin-top: 1rem;
      padding: 0.8rem 1rem;
      display: none;
    }
    .error-msg.visible { display: block; }

    footer {
      position: relative; z-index: 10;
      text-align: center;
      padding: 0 1rem 2rem;
      color: var(--muted);
      font-size: 0.78rem;
    }

    @keyframes fadeUp { from { opacity: 0; transform: translateY(24px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes fadeDown { from { opacity: 0; transform: translateY(-16px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 520px) {
      .form-grid { grid-template-columns: 1fr; }
      .goal-btns { grid-template-columns: 1fr; }
      .field.full { grid-column: 1; }
    }
  </style>
</head>
<body>
  <div class="noise"></div>

  <header>
    <span class="logo-leaf">🌿</span>
    <h1>Nutri<span>Vida</span></h1>
    <p>Plano alimentar personalizado por Inteligência Artificial</p>
    <div class="divider"></div>
  </header>

  <main>
    <div class="card" id="formCard">
      <h2>📋 Os seus dados</h2>
      <div class="form-grid">
        <div class="field full">
          <label>Nome completo</label>
          <input type="text" id="nome" placeholder="Ex: João Silva" />
        </div>
        <div class="field">
          <label>Idade (anos)</label>
          <input type="number" id="idade" placeholder="Ex: 28" min="10" max="99" />
        </div>
        <div class="field">
          <label>Peso (kg)</label>
          <input type="number" id="peso" placeholder="Ex: 75" min="30" max="300" step="0.1" />
        </div>
        <div class="field">
          <label>Altura (cm)</label>
          <input type="number" id="altura" placeholder="Ex: 175" min="100" max="250" />
        </div>
      </div>

      <div class="goal-section">
        <label>Objectivo</label>
        <div class="goal-btns">
          <button class="goal-btn" id="btnPerda" onclick="selectGoal('perda')">
            <span class="icon">🔥</span>
            <span class="lbl">Perder Peso</span>
            <span class="sub">Défice calórico saudável</span>
          </button>
          <button class="goal-btn muscle" id="btnMassa" onclick="selectGoal('massa')">
            <span class="icon">💪</span>
            <span class="lbl">Ganho de Massa</span>
            <span class="sub">Superavit calórico proteico</span>
          </button>
        </div>
      </div>

      <div class="error-msg" id="errorMsg"></div>

      <button class="btn-generate" id="btnGerar" onclick="gerarPlano()">
        ✨ Gerar Plano Alimentar
      </button>
    </div>

    <div class="loading" id="loading">
      <div class="spinner"></div>
      <p>A IA está a criar o seu plano personalizado…</p>
      <div class="loading-quote" id="loadingQuote"></div>
    </div>

    <div id="result">
      <div class="result-header" id="resultHeader">
        <div class="badge" id="resultBadge">Plano Alimentar</div>
        <h3 id="resultTitle">Plano Personalizado</h3>
        <p id="resultSub"></p>
      </div>
      <div class="result-body" id="resultBody"></div>
      <button class="btn-reset" onclick="resetForm()">↺ Criar novo plano</button>
    </div>
  </main>

  <footer>
    NutriVida &copy; 2025 · Este plano é informativo e não substitui consulta com nutricionista.
  </footer>

  <script>
    let selectedGoal = null;

    const quotes = [
      '"Que o alimento seja o teu remédio" — Hipócrates',
      '"Cuida do teu corpo, é o único lugar onde tens de viver."',
      '"Uma boa nutrição é o alicerce da saúde."',
      '"O que comes torna-te no que és."',
    ];

    function selectGoal(goal) {
      selectedGoal = goal;
      document.getElementById('btnPerda').classList.toggle('active', goal === 'perda');
      document.getElementById('btnMassa').classList.toggle('active', goal === 'massa');
      showError('');
    }

    function showError(msg) {
      const el = document.getElementById('errorMsg');
      el.textContent = msg;
      el.classList.toggle('visible', !!msg);
    }

    function calcIMC(peso, altura) {
      const h = altura / 100;
      return (peso / (h * h)).toFixed(1);
    }

    async function gerarPlano() {
      const nome = document.getElementById('nome').value.trim();
      const idade = document.getElementById('idade').value.trim();
      const peso = document.getElementById('peso').value.trim();
      const altura = document.getElementById('altura').value.trim();

      if (!nome) return showError('⚠️ Por favor insira o seu nome.');
      if (!idade || idade < 10 || idade > 99) return showError('⚠️ Insira uma idade válida (10–99).');
      if (!peso || peso < 30) return showError('⚠️ Insira um peso válido.');
      if (!altura || altura < 100) return showError('⚠️ Insira uma altura válida.');
      if (!selectedGoal) return showError('⚠️ Selecione um objectivo (perder peso ou ganhar massa).');

      showError('');
      document.getElementById('formCard').style.display = 'none';
      document.getElementById('result').classList.remove('visible');

      const loadingEl = document.getElementById('loading');
      loadingEl.classList.add('visible');
      document.getElementById('loadingQuote').textContent = quotes[Math.floor(Math.random() * quotes.length)];

      const imc = calcIMC(parseFloat(peso), parseFloat(altura));
      const goalText = selectedGoal === 'perda' ? 'perda de peso (emagrecimento)' : 'ganho de massa muscular (hipertrofia)';

      const prompt = `És um nutricionista especializado. Com base nos dados abaixo, cria um plano alimentar diário detalhado e personalizado em Português Europeu.

DADOS DO UTENTE:
- Nome: ${nome}
- Idade: ${idade} anos
- Peso: ${peso} kg
- Altura: ${altura} cm
- IMC: ${imc}
- Objectivo: ${goalText}

INSTRUÇÕES:
1. Calcula as calorias diárias recomendadas (usa a fórmula de Harris-Benedict).
2. Define a divisão de macronutrientes (proteínas, hidratos de carbono, gorduras) adequada ao objectivo.
3. Cria um plano alimentar completo para UM DIA, com 5-6 refeições: Pequeno-almoço, Lanche da manhã, Almoço, Lanche da tarde, Jantar, e (opcional) Ceia.
4. Para cada refeição, lista os alimentos com as quantidades em gramas ou unidades.
5. Indica as calorias aproximadas de cada refeição.
6. Adiciona uma secção de dicas importantes e alimentos a evitar.
7. Inclui uma nota motivacional personalizada para ${nome}.

Usa títulos com ## para as secções principais e ### para as refeições. Usa listas com * para os alimentos. Sê específico, prático e motivador.`;

      try {
        // Rota segura que aponta para o seu backend Serverless na Vercel
        const response = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: prompt })
        });

        const data = await response.json();

        if (!response.ok) {
          const errMsg = data?.error || 'Erro desconhecido no servidor.';
          throw new Error(errMsg);
        }

        // Assume que a propriedade retornada pela sua Serverless Function chama-se "response"
        const text = data?.response;
        if (!text) throw new Error('Resposta vazia do servidor.');

        loadingEl.classList.remove('visible');
        renderResult(nome, peso, altura, imc, text);

      } catch (err) {
        loadingEl.classList.remove('visible');
        document.getElementById('formCard').style.display = 'block';
        showError('❌ Erro: ' + err.message);
      }
    }

    function renderResult(nome, peso, altura, imc, markdown) {
      const isMuscle = selectedGoal === 'massa';

      const header = document.getElementById('resultHeader');
      header.className = 'result-header' + (isMuscle ? ' muscle' : '');
      document.getElementById('resultBadge').textContent = isMuscle ? '💪 Massa Muscular' : '🔥 Perda de Peso';
      document.getElementById('resultTitle').textContent = `Plano de ${nome}`;
      document.getElementById('resultSub').textContent = `Peso: ${peso}kg · Altura: ${altura}cm · IMC: ${imc}`;

      const body = document.getElementById('resultBody');
      body.innerHTML = markdownToHtml(markdown, isMuscle);

      document.getElementById('result').classList.add('visible');
      document.getElementById('result').scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    function markdownToHtml(md, isMuscle) {
      const muscleClass = isMuscle ? ' muscle-bg' : '';
      let html = md
        .replace(/^## (.+)$/gm, '<h2>$1</h2>')
        .replace(/^### (.+)$/gm, `<div class="meal-block${muscleClass}"><h3>$1</h3>`)
        .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
        .replace(/\*(.+?)\*/g, '<em>$1</em>')
        .replace(/^[\*\-] (.+)$/gm, '<li>$1</li>')
        .replace(/(<li>.*<\/li>\n?)+/g, '<ul>$&</ul>')
        .replace(/^(?!<[hul])(.+)$/gm, '<p>$1</p>');

      const lines = html.split('\n');
      let inBlock = false;
      let out = [];
      for (let line of lines) {
        if (line.includes('class="meal-block')) { inBlock = true; out.push(line); continue; }
        if (inBlock && line.startsWith('<h2>')) { out.push('</div>'); inBlock = false; }
        out.push(line);
      }
      if (inBlock) out.push('</div>');
      return out.join('\n');
    }

    function resetForm() {
      document.getElementById('result').classList.remove('visible');
      document.getElementById('formCard').style.display = 'block';
      selectedGoal = null;
      document.getElementById('btnPerda').classList.remove('active');
      document.getElementById('btnMassa').classList.remove('active');
      showError('');
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }
  </script>
</body>
</html>
